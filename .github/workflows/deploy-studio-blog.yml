name: Deploy Studio Blog

on:
  push:
    branches:
      - main
    paths:
      - apps/studio-blog/**
      - .github/actions/vercel-deploy/**
      - .github/actions/vercel-env-sync/**
      - .github/workflows/deploy-studio-blog.yml

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: studio-blog-vercel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: studio-blog-vercel
      url: ${{ steps.deployment.outputs.url }}

    env:
      SANITY_STUDIO_PROJECT_ID: ${{ secrets.STUDIO_BLOG_PROJECT_ID }}
      SANITY_STUDIO_DATASET: ${{ secrets.STUDIO_DATASET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint --filter studio-blog

      - name: Typecheck
        run: pnpm typecheck --filter studio-blog

      - name: Deploy Studio Blog to Vercel
        id: deployment
        uses: ./.github/actions/vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          environment-variables: |
            SANITY_STUDIO_PROJECT_ID=${{ env.SANITY_STUDIO_PROJECT_ID }}
            SANITY_STUDIO_DATASET=${{ env.SANITY_STUDIO_DATASET }}
